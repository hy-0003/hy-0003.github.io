<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="css/style_home.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页</title>
</head>
<body>
    
    <h1><em>Ver0003的个人主页</em></h1>
    <hr class="horizontal-divider">


    <div class="avatar-container">
        <img class="circular-image" src="my-image.jpg" alt="圆形图片">
        <div class="tag-container">
            <div class="tag">实操科研派</div>
            <div class="tag">编程爱好者</div>
            <div class="tag">“运动健将”</div>
        </div>
    </div>
    <br>
    <br>


    <div class="info-card">
        <div class="info-title">基本信息</div>
        <div class="info-row">
            <div class="info-item">年龄: 19</div>
            <div class="info-item">政治面貌：预备党员</div>
        </div>
        <div class="info-row">
            <div class="info-item">就读院校: 兰州大学萃英学院</div>
            <div class="info-item">专业: 数学与应用数学</div>
        </div>
    </div>
    <br>
    <br>
    <div class="info-study" onclick="navigateToStudy()">
        <h2 style="font-style: italic;">学习成绩（国家基础学科拔尖学生培养计划）</h2>
        <div class="gpa-rank">
            <span class="label">GPA: &nbsp; 3.92</span>
            <span class="label">Rank: &nbsp; 5%</span>
        </div>
            <h3>主修课程</h3>
            <div class="info-row">
                <div class="info-item">C++程序设计(95)</div>
                <div class="info-item">解析几何(99)</div>
                <div class="info-item">高等代数(97)</div>
                <div class="info-item">计算机基础与c语言(88)</div>
            </div>
            <div class="info-row">
                <div class="info-item">常微分方程(93)</div>
                <div class="info-item">普通物理(94)</div>
                <div class="info-item">数学分析(88)</div>
                <div class="info-item">抽象代数(88)</div>
            </div>
    </div>
    

    <br>
    <br>
    <br>
    <br>
    <br>
    <hr class="horizontal-divider">
    <br>
    <br>
    <br>
    <!-- 流程图容器 -->
    <div class="flowchart-container">
        <div class="flowchart-step">
            <div class="step-circle">我的主页</div>
            <div class="step-arrow"></div>
        </div>
        <div class="flowchart-step">
            <div class="step-circle">我的作品图集</div>
            <div class="step-arrow"></div>
        </div>
        <div class="flowchart-step">
            <div class="step-circle">我的项目</div>
            <div class="step-arrow"></div>
        </div>
        <div class="flowchart-step">
            <div class="step-circle">我的奖项与技能</div>
        </div>
    </div>

    <br>
    <br>
    <br>
    <br>
    <br>
    <div class="button-container">
        <button class="beautiful-button" onclick="location.href='image.html'">我的作品图集</button>
    </div>
    <script src="js/ori.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
