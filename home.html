<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style_home.css">
    <title>主页</title>
</head>
<body>
    
    <h1><em>Ver0003的个人主页</em></h1>
    <hr class="horizontal-divider">
    <img class="circular-image" src="my-image.jpg" alt="圆形图片">

    <br>
    <div class="info-card">
        <div class="info-title">基本信息</div>

        </div>

            <div class="info-item">专业: 数学与应用数学</div>
        </div>
    </div>
    <br>
    <br>
    <div class="info-study" onclick="navigateToStudy()">
        <h2 style="font-style: italic;">学习成绩</h2>
        <div class="gpa-rank">
            <span class="label">GPA: &nbsp; 3.92</span>
            <span class="label">Rank: &nbsp; 5%</span>
        </div>
            <h3>主修课程</h3>
            <div class="info-row">
                <div class="info-item">C++程序设计(95)</div>
                <div class="info-item">解析几何(99)</div>
                <div class="info-item">高等代数(97)</div>
                <div class="info-item">计算机基础与c语言(88)</div>
            </div>
            <div class="info-row">
                <div class="info-item">常微分方程(93)</div>
                <div class="info-item">普通物理(94)</div>
                <div class="info-item">数学分析(88)</div>
                <div class="info-item">抽象代数(88)</div>
            </div>
    </div>

    <br>
    <br>
    <div class="button-container">
        <button class="beautiful-button" onclick="location.href='image.html'">我的作品图集</button>
    </div>
    <script src="js/ori.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
